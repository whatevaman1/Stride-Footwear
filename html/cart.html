<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — STRIDE</title>
  <meta name="description" content="Review items in your STRIDE shopping cart and proceed to checkout.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0f0f0f] text-gray-100 font-sans">

  <nav id="main-nav"></nav>

  <header class="page-header">
    <p class="text-amber-400 font-semibold text-sm uppercase tracking-[0.2em] mb-2">Shopping</p>
    <h1 class="text-4xl sm:text-5xl font-bold text-white">Your Cart</h1>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
    <div class="breadcrumb" id="breadcrumbs"></div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Cart Items -->
      <div class="lg:col-span-2 space-y-4" id="cart-items">
        <!-- Rendered by JS -->
      </div>

      <!-- Order Summary -->
      <div id="cart-summary" class="lg:col-span-1">
        <div class="glass-card p-6 sticky top-24">
          <h2 class="text-lg font-bold text-white mb-6">Order Summary</h2>

          <div class="space-y-3 mb-6">
            <div class="flex justify-between text-sm">
              <span class="text-gray-400" id="cart-item-count">0 items</span>
              <span class="text-white" id="cart-subtotal">₹0</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="text-gray-400">Shipping</span>
              <span class="text-white" id="cart-shipping">₹0</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="text-gray-400">Estimated Tax</span>
              <span class="text-white" id="cart-tax">₹0</span>
            </div>
            <div class="h-px bg-white/10"></div>
            <div class="flex justify-between">
              <span class="font-semibold text-white">Total</span>
              <span class="font-bold text-xl text-amber-400" id="cart-total">₹0</span>
            </div>
          </div>

          <!-- Free Shipping Progress -->
          <div class="mb-6" id="shipping-progress">
            <script>
              document.addEventListener('DOMContentLoaded', () => {
                const subtotal = getCartTotal();
                const remaining = Math.max(0, 8000 - subtotal);
                const progress = Math.min(100, (subtotal / 8000) * 100);
                const el = document.getElementById('shipping-progress');
                if (el) {
                  el.innerHTML = subtotal >= 8000
                    ? '<p class="text-green-400 text-sm flex items-center gap-2">✅ You qualify for free shipping!</p>'
                    : `<p class="text-gray-400 text-xs mb-2">Add <span class="text-amber-400 font-semibold">₹${remaining.toLocaleString('en-IN')}</span> more for free shipping</p>
                       <div class="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                         <div class="h-full bg-gradient-to-r from-amber-500 to-amber-400 rounded-full transition-all" style="width: ${progress}%"></div>
                       </div>`;
                }
              });
            </script>
          </div>

          <button onclick="proceedToCheckout()" class="btn-primary w-full py-3.5 text-base" id="checkout-btn">
            Proceed to Checkout
          </button>

          <a href="products.html" class="block text-center text-sm text-gray-400 hover:text-amber-400 transition-colors mt-4">
            ← Continue Shopping
          </a>

          <!-- Promo Code -->
          <div class="mt-6 pt-6 border-t border-white/5">
            <p class="text-sm font-medium text-gray-300 mb-2">Promo Code</p>
            <div class="flex gap-2">
              <input type="text" class="form-input text-sm py-2.5 flex-1" placeholder="Enter code" id="promo-code">
              <button class="btn-secondary text-sm px-4" onclick="showToast('Promo code applied!', 'success')">Apply</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer id="main-footer"></footer>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/cart.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { if (typeof setBreadcrumbs==='function') setBreadcrumbs([{label:'Cart'}]); });</script>
</body>
</html>

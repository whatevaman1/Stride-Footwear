<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Reviews — STRIDE</title>
  <meta name="description" content="See what our customers say about STRIDE footwear. Real reviews from verified buyers.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0f0f0f] text-gray-100 font-sans">

  <nav id="main-nav"></nav>

  <header class="page-header">
    <p class="text-amber-400 font-semibold text-sm uppercase tracking-[0.2em] mb-2">Testimonials</p>
    <h1 class="text-4xl sm:text-5xl font-bold text-white">Customer Reviews</h1>
    <p class="text-gray-400 mt-3 max-w-md mx-auto">Real feedback from real customers who love their STRIDE shoes.</p>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
    <div class="breadcrumb" id="breadcrumbs"></div>
    <!-- Rating Overview -->
    <div class="glass-card p-8 mb-10 animate-fade-in-up">
      <div class="flex flex-col md:flex-row items-center gap-8">
        <!-- Overall Rating -->
        <div class="text-center flex-shrink-0">
          <p class="text-6xl font-bold text-white" id="overall-rating">4.8</p>
          <div class="flex justify-center mt-2" id="overall-stars">
            <span class="star filled text-xl">★</span>
            <span class="star filled text-xl">★</span>
            <span class="star filled text-xl">★</span>
            <span class="star filled text-xl">★</span>
            <span class="star filled text-xl">★</span>
          </div>
          <p class="text-gray-400 text-sm mt-2" id="total-reviews">Based on 8 reviews</p>
        </div>

        <!-- Rating Distribution -->
        <div class="flex-1 w-full max-w-md">
          <div class="space-y-2" id="rating-bars">
            <!-- Filled by JS -->
          </div>
        </div>

        <!-- Write Review -->
        <div class="text-center flex-shrink-0">
          <button onclick="toggleWriteReview()" class="btn-primary px-6 py-3" id="write-review-btn">
            ✍️ Write a Review
          </button>
        </div>
      </div>
    </div>

    <!-- Write Review Form (hidden by default) -->
    <div class="glass-card p-8 mb-10 hidden animate-scale-in" id="write-review-form">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-white">Write Your Review</h2>
        <button onclick="toggleWriteReview()" class="text-gray-400 hover:text-white text-xl">&times;</button>
      </div>
      <form id="review-form" onsubmit="submitReview(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-2">Your Rating</label>
          <div class="flex gap-2" id="review-star-input">
            <button type="button" onclick="setReviewRating(1)" class="text-3xl star hover:text-amber-400 transition-colors" data-star="1">★</button>
            <button type="button" onclick="setReviewRating(2)" class="text-3xl star hover:text-amber-400 transition-colors" data-star="2">★</button>
            <button type="button" onclick="setReviewRating(3)" class="text-3xl star hover:text-amber-400 transition-colors" data-star="3">★</button>
            <button type="button" onclick="setReviewRating(4)" class="text-3xl star hover:text-amber-400 transition-colors" data-star="4">★</button>
            <button type="button" onclick="setReviewRating(5)" class="text-3xl star hover:text-amber-400 transition-colors" data-star="5">★</button>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          <div>
            <label for="review-name" class="block text-sm font-medium text-gray-300 mb-2">Your Name</label>
            <input type="text" id="review-name" class="form-input" placeholder="John Doe" required>
          </div>
          <div>
            <label for="review-title" class="block text-sm font-medium text-gray-300 mb-2">Review Title</label>
            <input type="text" id="review-title" class="form-input" placeholder="Great shoes!" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="review-text" class="block text-sm font-medium text-gray-300 mb-2">Your Review</label>
          <textarea id="review-text" class="form-input h-28 resize-none" placeholder="Share your experience..." required></textarea>
        </div>

        <button type="submit" class="btn-primary py-3 px-8">Submit Review</button>
      </form>
    </div>

    <!-- Filter Bar -->
    <div class="flex flex-wrap items-center gap-3 mb-8">
      <button onclick="filterReviews('all')" class="category-pill active" id="filter-all">All Reviews</button>
      <button onclick="filterReviews(5)" class="category-pill" id="filter-5">5 Stars</button>
      <button onclick="filterReviews(4)" class="category-pill" id="filter-4">4 Stars</button>
      <button onclick="filterReviews(3)" class="category-pill" id="filter-3">3 Stars</button>
    </div>

    <!-- Reviews List -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="reviews-list">
      <!-- Rendered by JS -->
    </div>
  </main>

  <footer id="main-footer"></footer>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    let reviewRating = 0;
    let currentFilter = 'all';

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof setBreadcrumbs==='function') setBreadcrumbs([{label:'Reviews'}]);
      renderRatingBars();
      renderReviews();
    });

    function renderRatingBars() {
      const bars = document.getElementById('rating-bars');
      if (!bars) return;

      const counts = [0, 0, 0, 0, 0];
      REVIEWS.forEach(r => counts[r.rating - 1]++);
      const total = REVIEWS.length;

      bars.innerHTML = [5, 4, 3, 2, 1].map(star => {
        const count = counts[star - 1];
        const pct = total ? (count / total * 100) : 0;
        return `
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-400 w-12">${star} star</span>
            <div class="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
              <div class="h-full bg-amber-500 rounded-full transition-all" style="width: ${pct}%"></div>
            </div>
            <span class="text-sm text-gray-500 w-8 text-right">${count}</span>
          </div>
        `;
      }).join('');

      // Overall rating
      const avg = REVIEWS.reduce((sum, r) => sum + r.rating, 0) / total;
      const overallEl = document.getElementById('overall-rating');
      if (overallEl) overallEl.textContent = avg.toFixed(1);

      const totalEl = document.getElementById('total-reviews');
      if (totalEl) totalEl.textContent = `Based on ${total} reviews`;
    }

    function renderReviews() {
      const container = document.getElementById('reviews-list');
      if (!container) return;

      let filtered = [...REVIEWS];
      if (currentFilter !== 'all') {
        filtered = filtered.filter(r => r.rating === currentFilter);
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="col-span-full text-center py-12">
            <div class="text-5xl mb-3">📝</div>
            <p class="text-gray-400">No reviews with this rating yet.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map((review, idx) => {
        const product = PRODUCTS.find(p => p.id === review.productId);
        return `
          <div class="review-card animate-fade-in-up stagger-${Math.min(idx + 1, 6)}">
            <!-- Review Header -->
            <div class="flex items-start gap-3 mb-4">
              <div class="w-11 h-11 rounded-full bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-sm font-bold text-black flex-shrink-0">
                ${review.avatar}
              </div>
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  <p class="font-medium text-white">${review.name}</p>
                  ${review.verified ? '<span class="text-xs text-green-400 bg-green-400/10 px-2 py-0.5 rounded-full">✓ Verified</span>' : ''}
                </div>
                <div class="flex items-center gap-2 mt-0.5">
                  <div class="flex">${renderStars(review.rating)}</div>
                  <span class="text-xs text-gray-500">${review.date}</span>
                </div>
              </div>
            </div>

            <!-- Review Content -->
            <h3 class="font-semibold text-white mb-2">${review.title}</h3>
            <p class="text-gray-400 text-sm leading-relaxed mb-4">${review.text}</p>

            <!-- Product Reference -->
            ${product ? `
              <div class="flex items-center gap-3 p-3 rounded-xl bg-white/[0.03] border border-white/5">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-gray-900 to-gray-800 flex-shrink-0">
                  <img src="${IMG_PATH}${product.image}" alt="${product.name}" class="w-full h-full object-contain p-1.5">
                </div>
                <div>
                  <p class="text-sm font-medium text-white">${product.name}</p>
                  <p class="text-xs text-gray-500">${product.subcategory} · ${formatPrice(product.price)}</p>
                </div>
              </div>
            ` : ''}

            <!-- Helpful -->
            <div class="flex items-center gap-4 mt-4 pt-3 border-t border-white/5">
              <button class="text-xs text-gray-500 hover:text-amber-400 transition-colors" onclick="this.innerHTML='👍 Helpful (1)'; this.disabled=true; this.className='text-xs text-amber-400'">
                👍 Helpful (0)
              </button>
              <button class="text-xs text-gray-500 hover:text-gray-300 transition-colors" onclick="showToast('Review reported', 'info')">
                🚩 Report
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterReviews(rating) {
      currentFilter = rating;
      document.querySelectorAll('[id^="filter-"]').forEach(btn => {
        btn.classList.toggle('active', btn.id === `filter-${rating}`);
      });
      renderReviews();
    }

    function toggleWriteReview() {
      const form = document.getElementById('write-review-form');
      form.classList.toggle('hidden');
      if (!form.classList.contains('hidden')) {
        form.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function setReviewRating(rating) {
      reviewRating = rating;
      document.querySelectorAll('#review-star-input button').forEach(btn => {
        const star = parseInt(btn.dataset.star);
        btn.classList.toggle('filled', star <= rating);
      });
    }

    function submitReview(e) {
      e.preventDefault();
      if (reviewRating === 0) {
        showToast('Please select a rating', 'error');
        return;
      }

      const name = document.getElementById('review-name').value.trim();
      const title = document.getElementById('review-title').value.trim();
      const text = document.getElementById('review-text').value.trim();

      if (!name || !title || !text) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      // Add review to REVIEWS array
      REVIEWS.unshift({
        id: REVIEWS.length + 1,
        name: name,
        avatar: name.split(' ').map(n => n[0]).join('').toUpperCase(),
        rating: reviewRating,
        date: new Date().toISOString().split('T')[0],
        title: title,
        text: text,
        productId: null,
        verified: false
      });

      showToast('Thank you for your review! ⭐', 'success');
      document.getElementById('review-form').reset();
      reviewRating = 0;
      document.querySelectorAll('#review-star-input button').forEach(btn => btn.classList.remove('filled'));
      toggleWriteReview();
      renderRatingBars();
      renderReviews();
    }
  </script>
</body>
</html>

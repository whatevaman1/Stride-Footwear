<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — STRIDE</title>
  <meta name="description" content="Manage your STRIDE account, view orders, and update your profile.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0f0f0f] text-gray-100 font-sans">

  <nav id="main-nav"></nav>

  <header class="page-header">
    <p class="text-amber-400 font-semibold text-sm uppercase tracking-[0.2em] mb-2">Dashboard</p>
    <h1 class="text-4xl sm:text-5xl font-bold text-white">My Account</h1>
  </header>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pb-20" id="account-content">
    <div class="breadcrumb" id="breadcrumbs"></div>
    <!-- Profile Card -->
    <div class="glass-card p-8 mb-8 animate-fade-in-up" id="profile-card">
      <!-- Rendered by JS below -->
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <a href="orders.html" class="glass-card p-6 text-center group animate-fade-in-up stagger-1">
        <div class="text-3xl mb-3">📦</div>
        <h3 class="font-semibold text-white group-hover:text-amber-400 transition-colors">My Orders</h3>
        <p class="text-gray-400 text-sm mt-1">Track and manage orders</p>
      </a>
      <a href="cart.html" class="glass-card p-6 text-center group animate-fade-in-up stagger-2">
        <div class="text-3xl mb-3">🛒</div>
        <h3 class="font-semibold text-white group-hover:text-amber-400 transition-colors">My Cart</h3>
        <p class="text-gray-400 text-sm mt-1">View saved items</p>
      </a>
      <a href="products.html" class="glass-card p-6 text-center group animate-fade-in-up stagger-3">
        <div class="text-3xl mb-3">🛍️</div>
        <h3 class="font-semibold text-white group-hover:text-amber-400 transition-colors">Shop More</h3>
        <p class="text-gray-400 text-sm mt-1">Browse the latest</p>
      </a>
    </div>

    <!-- Recent Orders Preview -->
    <div class="glass-card p-6 animate-fade-in-up stagger-4">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-bold text-white">Recent Orders</h2>
        <a href="orders.html" class="text-amber-400 text-sm hover:text-amber-300 transition-colors">View All →</a>
      </div>
      <div class="overflow-x-auto" id="recent-orders-table">
        <!-- Rendered by JS below -->
      </div>
    </div>
  </main>

  <footer id="main-footer"></footer>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof setBreadcrumbs==='function') setBreadcrumbs([{label:'Account'}]);
      const user = getUser();
      if (!user) {
        showToast('Please sign in to view your account', 'warning');
        setTimeout(() => window.location.href = 'login.html', 1000);
        return;
      }

      // Profile Card
      const profileCard = document.getElementById('profile-card');
      profileCard.innerHTML = `
        <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6">
          <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-2xl font-bold text-black flex-shrink-0">
            ${user.name.split(' ').map(n => n[0]).join('')}
          </div>
          <div class="flex-1 text-center sm:text-left">
            <h2 class="text-2xl font-bold text-white">${user.name}</h2>
            <p class="text-gray-400 mt-1">${user.email}</p>
            <p class="text-gray-500 text-sm mt-1">📱 ${user.phone || 'Not set'}</p>
            <p class="text-gray-500 text-sm mt-1">📅 Member since ${user.joinDate}</p>
          </div>
          <div class="flex gap-3">
            <button onclick="showToast('Profile editor coming soon!', 'info')" class="btn-secondary text-sm">Edit Profile</button>
            <button onclick="logout()" class="btn-danger text-sm">Logout</button>
          </div>
        </div>
      `;

      // Recent Orders
      const table = document.getElementById('recent-orders-table');
      const recentOrders = DUMMY_ORDERS.slice(0, 3);
      table.innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Date</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${recentOrders.map(order => `
              <tr>
                <td class="font-mono text-sm text-amber-400">${order.id}</td>
                <td class="text-sm">${order.date}</td>
                <td class="text-sm">${order.items.map(i => i.name).join(', ')}</td>
                <td class="font-semibold">${formatPrice(order.total)}</td>
                <td><span class="status-badge ${order.status.toLowerCase()}">${order.status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    });
  </script>
</body>
</html>

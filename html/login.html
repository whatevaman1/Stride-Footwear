<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — STRIDE</title>
  <meta name="description" content="Sign in to your STRIDE account to access your orders, wishlist, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0f0f0f] text-gray-100 font-sans">

  <nav id="main-nav"></nav>

  <main class="min-h-screen flex items-center justify-center px-4 pt-20 pb-12">
    <div class="w-full max-w-md animate-fade-in-up">
      <!-- Header -->
      <div class="text-center mb-8">
        <a href="../index.html" class="text-3xl font-extrabold gradient-text">STRIDE</a>
        <h1 class="text-2xl font-bold text-white mt-4">Welcome Back</h1>
        <p class="text-gray-400 mt-2">Sign in to continue your journey</p>
      </div>

      <!-- Login Form -->
      <div class="glass-card p-8">
        <form id="login-form" novalidate>
          <!-- Email -->
          <div class="mb-5">
            <label for="login-email" class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
            <div class="relative">
              <input type="email" id="login-email" class="form-input pl-11" placeholder="you@example.com" required>
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">📧</span>
            </div>
            <p class="error-message" id="login-email-error"></p>
          </div>

          <!-- Password -->
          <div class="mb-5">
            <label for="login-password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
            <div class="relative">
              <input type="password" id="login-password" class="form-input pl-11" placeholder="••••••••" required>
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔒</span>
            </div>
            <p class="error-message" id="login-password-error"></p>
          </div>

          <!-- Remember & Forgot -->
          <div class="flex items-center justify-between mb-6">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="custom-checkbox" id="remember-me">
              <span class="text-sm text-gray-400">Remember me</span>
            </label>
            <a href="#" class="text-sm text-amber-400 hover:text-amber-300 transition-colors">Forgot password?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary w-full py-3.5 text-base" id="login-submit">
            Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-4 my-6">
          <div class="flex-1 h-px bg-white/10"></div>
          <span class="text-xs text-gray-500 uppercase tracking-wider">or</span>
          <div class="flex-1 h-px bg-white/10"></div>
        </div>

        <!-- Social Login Buttons -->
        <div class="flex gap-3">
          <button class="btn-secondary flex-1 py-3" onclick="showToast('Social login coming soon!', 'info')">
            <span class="text-lg">G</span> Google
          </button>
          <button class="btn-secondary flex-1 py-3" onclick="showToast('Social login coming soon!', 'info')">
            <span class="text-lg">🍎</span> Apple
          </button>
        </div>
      </div>

      <!-- Sign Up Link -->
      <p class="text-center text-gray-400 text-sm mt-6">
        Don't have an account?
        <a href="signup.html" class="text-amber-400 font-medium hover:text-amber-300 transition-colors">Create one →</a>
      </p>
    </div>
  </main>

  <footer id="main-footer"></footer>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" ng-app="strideApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — STRIDE</title>
  <meta name="description" content="Sign in to your STRIDE account to access your orders, wishlist, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0f0f0f] text-gray-100 font-sans" ng-controller="AppController">
  <div class="toast" ng-class="{'show': toast.visible, 'success': toast.type==='success', 'error': toast.type==='error'}" ng-if="toast.message">
    <span>{{toastIcons[toast.type] || 'ℹ️'}}</span><span ng-bind="toast.message"></span>
  </div>
  <nav id="main-nav" class="fixed top-0 w-full z-50 bg-[#0f0f0f]/80 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a ng-href="{{paths.ROOT_PATH}}index.html" class="text-2xl font-extrabold gradient-text tracking-tight">STRIDE</a>
        <div class="flex items-center space-x-2">
          <a ng-href="cart.html" class="relative p-2 rounded-lg hover:bg-white/5 transition-all group"><svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><span class="absolute -top-1 -right-1 badge" ng-show="cartCount > 0" ng-bind="cartCount"></span></a>
        </div>
      </div>
    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center px-4 pt-20 pb-12" ng-controller="LoginController">
    <div class="w-full max-w-md animate-fade-in-up">
      <div class="text-center mb-8">
        <a href="../index.html" class="text-3xl font-extrabold gradient-text">STRIDE</a>
        <h1 class="text-2xl font-bold text-white mt-4">Welcome Back</h1>
        <p class="text-gray-400 mt-2">Sign in to continue your journey</p>
      </div>
      <div class="glass-card p-8">
        <form ng-submit="submitLogin()" novalidate>
          <div class="mb-5">
            <label for="login-email" class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
            <div class="relative">
              <input type="email" id="login-email" class="form-input pl-11" placeholder="you@example.com"
                     ng-model="login.email" ng-focus="clearError('email')" ng-blur="validateLoginField('email')"
                     ng-class="{'error': loginErrors.email, 'success': login.email && !loginErrors.email}">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">📧</span>
            </div>
            <p class="error-message" ng-class="{'visible': loginErrors.email}" ng-bind="loginErrors.email"></p>
          </div>
          <div class="mb-5">
            <label for="login-password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
            <div class="relative">
              <input type="password" id="login-password" class="form-input pl-11" placeholder="••••••••"
                     ng-model="login.password" ng-focus="clearError('password')" ng-blur="validateLoginField('password')"
                     ng-class="{'error': loginErrors.password, 'success': login.password && !loginErrors.password}">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔒</span>
            </div>
            <p class="error-message" ng-class="{'visible': loginErrors.password}" ng-bind="loginErrors.password"></p>
          </div>
          <div class="flex items-center justify-between mb-6">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="custom-checkbox" ng-model="login.remember">
              <span class="text-sm text-gray-400">Remember me</span>
            </label>
            <a href="#" class="text-sm text-amber-400 hover:text-amber-300 transition-colors">Forgot password?</a>
          </div>
          <button type="submit" class="btn-primary w-full py-3.5 text-base" ng-disabled="loginSubmitting">
            <span ng-if="!loginSubmitting">Sign In</span>
            <span ng-if="loginSubmitting">⏳ Signing in...</span>
          </button>
        </form>
        <div class="flex items-center gap-4 my-6">
          <div class="flex-1 h-px bg-white/10"></div>
          <span class="text-xs text-gray-500 uppercase tracking-wider">or</span>
          <div class="flex-1 h-px bg-white/10"></div>
        </div>
        <div class="flex gap-3">
          <button class="btn-secondary flex-1 py-3" ng-click="socialLogin()"><span class="text-lg">G</span> Google</button>
          <button class="btn-secondary flex-1 py-3" ng-click="socialLogin()"><span class="text-lg">🍎</span> Apple</button>
        </div>
      </div>
      <p class="text-center text-gray-400 text-sm mt-6">Don't have an account? <a href="signup.html" class="text-amber-400 font-medium hover:text-amber-300 transition-colors">Create one →</a></p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="border-t border-white/5 pt-6 text-center"><p class="text-gray-500 text-xs">&copy; 2026 STRIDE. All rights reserved.</p></div></div>
  </footer>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/ng-app.js"></script>
</body>
</html>
